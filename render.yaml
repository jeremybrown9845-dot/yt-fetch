services:
  # ── Backend (Python Web Service) ────────────────────────────────────────
  - type: web
    name: fetch-backend
    runtime: python
    buildCommand: |
      pip install -r requirements.txt
      apt-get install -y ffmpeg || true
    startCommand: python server.py
    healthCheckPath: /health
    envVars:
      - key: ALLOWED_ORIGIN
        value: https://fetch-frontend.onrender.com   # ← update after frontend is created

  # ── Frontend (Static Site) ───────────────────────────────────────────────
  - type: web
    name: fetch-frontend
    runtime: static
    staticPublishPath: .
    buildCommand: echo "No build step needed"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
